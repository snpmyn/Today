<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>今日隐私政策</title>
    <style>
        body {
            color: #585858;
            width: auto;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #fff8f0; /* 温馨背景色 */
            padding: 12px;
            margin: 0;
        }

        .card {
            background-color: #fff5e8; /* 卡片背景色 温馨柔和 */
            border-radius: 16px;       /* 圆角 */
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); /* 柔和阴影 */
            max-width: 600px;
            margin: 20px auto;
        }

        .card p {
            text-indent: 2em;
            text-align: justify;
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 1px;
            margin: 0;
        }
    </style>
</head>
<body>
<div class="card">
    <p>
        本应用数据默认本地存储，不上传服务器，确保隐私安全。数据备份目录为本地 Documents
        目录，勿随意删除。
    </p>
</div>
</body>
</html>
